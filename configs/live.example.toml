[paths]
store_path = 'data\project_lux_live.sqlite3'
input_csv = ''

[strategy]
entry_z = 2.0
exit_z = 1.0
leg_notional_twd = 1000000.0
initial_capital_twd = 2000000.0
max_entry_delay_minutes = 15
zscore_window = 500

[fees]
us_leg_fee_bps = 5.0
tw_leg_fee_per_contract_twd = 88.0
tw_leg_tax_rate = 0.00002
tw_leg_contract_multiplier = 100.0
us_leg_contract_multiplier = 5.0

[safety]
allow_live_order = false
validate_expected_zscore = false
expected_zscore_tolerance = 0.0000001

[contract_policy]
enabled = true
min_business_days_to_expiry = 5
force_exit_business_days_before_expiry = 1
force_exit_time = '13:35'
holidays = []

[trading_calendar]
# 2026 TAIFEX futures market non-trading weekdays.
# Source: https://www.taifex.com.tw/file/taifex/CHINESE/4/2026Calendar.pdf
closed_dates = [
  '2026-01-01',
  '2026-02-12',
  '2026-02-13',
  '2026-02-16',
  '2026-02-17',
  '2026-02-18',
  '2026-02-19',
  '2026-02-20',
  '2026-02-27',
  '2026-04-03',
  '2026-04-06',
  '2026-05-01',
  '2026-06-19',
  '2026-09-25',
  '2026-09-28',
  '2026-10-09',
  '2026-10-26',
  '2026-12-25',
]

[live_market_data]
polling_seconds = 1.0
minute_finalize_delay_seconds = 1.0
stale_seconds = 10.0
tw_leg_book_stale_seconds = 55.0
sync_windows_time_on_startup = true
clock_skew_fail_seconds = 60.0
windows_time_sync_timeout_seconds = 15.0
max_leg_timestamp_skew_seconds = 10.0
warmup_minutes = 500
warmup_qff_max_trailing_fill_minutes = 5
tw_leg_product = 'QFF'
tw_leg_symbol = 'auto'
binance_symbol = 'TSM/USDT:USDT'
bitopro_symbol = 'USDT/TWD'
fubon_env_path = '.env'
taifex_use_network = true
taifex_cache_dir = 'data\taifex_cache'
taifex_qff_1m_csv = 'D:\Users\Documents\Proof of Concept\data\processed\qff1_1m.csv'

[broker_reconciliation]
enabled = false
fail_on_mismatch = false
us_leg_units_tolerance = 0.000001
tw_leg_contract_tolerance = 0

[live_execution]
enabled = false
require_readonly_reconciliation = true
max_plan_age_seconds = 120
tw_leg_first = true

[binance_execution]
leverage = 1
margin_mode = 'cross'
enforce_leverage = true

[margin_management]
# Semi-automatic dual-account margin policy (PoC margin_management_analysis).
# The system only computes and reports transfer guidance; transfers and closes
# stay manual. Requires LUX_READONLY_BROKER=1 at runtime.
enabled = false
check_time = '10:00'
red_line_interval_minutes = 15
binance_transfer_ratio = 0.11
binance_red_line_ratio = 0.05
fubon_transfer_ratio = 0.20
fubon_red_line_ratio = 0.135
target_ratio = 0.30
red_line_maint_multiplier = 1.3
# 0 falls back to strategy.leg_notional_twd
leg_notional_twd = 0.0

[ntfy]
# Best-effort live notifications. Public ntfy.sh topic names should be hard to
# guess. --quiet-ui only hides terminal output and does not disable ntfy.
enabled = false
server_url = 'https://ntfy.sh'
status_topic = ''
trades_topic = ''
errors_topic = ''
request_timeout_seconds = 3.0
