[paths]
store_path = 'data\warmup_smoke.sqlite3'

[[pairs]]
id = 'qff_tsm'
label = 'QFF/TSM'

[pairs.data]
input_csv = ''

[pairs.tw_leg]
display = 'QFF'
venue = 'fubon'
product = 'QFF'
symbol = 'auto'
