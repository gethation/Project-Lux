# Local live-execute config aligned to config.live.exec.dryrun.local.toml.
# This file is gitignored by configs/*.local.toml.
# WARNING: live-execute can place real orders when runtime env gates are set.

[paths]
store_path = 'data\project_lux_live_execute.sqlite3'
input_csv = 'D:\Users\Documents\Proof of Concept\data\processed\qff_tsm_spread_zscore_1m_taipei_qff_session_w500.csv'
qff_ohlcv_csv = 'D:\Users\Documents\Proof of Concept\data\processed\qff1_1m.csv'
tsm_ohlcv_csv = 'D:\Users\Documents\Proof of Concept\data\processed\binance_tsmusdtp_1m_taipei.csv'
usdttwd_ohlcv_csv = 'D:\Users\Documents\Proof of Concept\data\processed\bitopro_usdttwd_1m_taipei.csv'

[strategy]
entry_z = 2.0
exit_z = 1.0
leg_notional_twd = 1000000.0
initial_capital_twd = 2000000.0
max_entry_delay_minutes = 15
zscore_window = 500
qff_lots = 1

[fees]
tsm_fee_bps = 5.0
qff_fee_per_contract_twd = 88.0
qff_tax_rate = 0.00002
qff_contract_multiplier = 100.0
tsm_contract_multiplier = 5.0

[safety]
allow_live_order = true
validate_expected_zscore = true
expected_zscore_tolerance = 0.0000001

[contract_policy]
enabled = true
min_business_days_to_expiry = 5
force_exit_business_days_before_expiry = 1
force_exit_time = '13:35'
holidays = []

[trading_calendar]
# 2026 TAIFEX futures market non-trading weekdays.
# Source: https://www.taifex.com.tw/file/taifex/CHINESE/4/2026Calendar.pdf
closed_dates = [
  '2026-01-01',
  '2026-02-12',
  '2026-02-13',
  '2026-02-16',
  '2026-02-17',
  '2026-02-18',
  '2026-02-19',
  '2026-02-20',
  '2026-02-27',
  '2026-04-03',
  '2026-04-06',
  '2026-05-01',
  '2026-06-19',
  '2026-09-25',
  '2026-09-28',
  '2026-10-09',
  '2026-10-26',
  '2026-12-25',
]

[live_market_data]
polling_seconds = 1.0
minute_finalize_delay_seconds = 1.0
stale_seconds = 10.0
qff_book_stale_seconds = 55.0
sync_windows_time_on_startup = true
clock_skew_fail_seconds = 60.0
windows_time_sync_timeout_seconds = 15.0
max_leg_timestamp_skew_seconds = 10.0
warmup_minutes = 500
warmup_forward_fill_max_ratio = 0.9
warmup_qff_max_trailing_fill_minutes = 5
qff_product = 'QFF'
qff_symbol = 'auto'
binance_symbol = 'TSM/USDT:USDT'
bitopro_symbol = 'USDT/TWD'
fubon_env_path = 'env'
taifex_use_network = true
taifex_cache_dir = 'data\taifex_cache'
taifex_qff_1m_csv = 'D:\Users\Documents\Proof of Concept\data\processed\qff1_1m.csv'

[broker_reconciliation]
enabled = true
fail_on_mismatch = true
tsm_units_tolerance = 0.000001
qff_contract_tolerance = 0

[live_execution]
enabled = true
require_readonly_reconciliation = true
max_plan_age_seconds = 120
qff_first = true

[binance_execution]
leverage = 4
margin_mode = 'cross'
enforce_leverage = true

[margin_management]
# Completed 10:00 Taipei waterline policy from PoC docs/margin_management_analysis.md.
# Checks are read-only: set LUX_READONLY_BROKER=1 to run the live loop margin panel
# or `lux.ps1 margin-check`; no transfer or close is initiated automatically.
enabled = true
check_time = '10:00'
red_line_interval_minutes = 240
binance_transfer_ratio = 0.11
binance_red_line_ratio = 0.05
fubon_transfer_ratio = 0.20
fubon_red_line_ratio = 0.135
target_ratio = 0.30
red_line_maint_multiplier = 1.3
# 0 lets live margin checks derive the denominator from strategy.qff_lots and
# the latest QFF price. Set a positive value only to force a fixed denominator.
leg_notional_twd = 0.0
